<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Craft Studio | Arquitetura e Governança Power Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0b0f19;
            --bg-secondary: #111827;
            --bg-tertiary: #1f2937;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --accent-green: #10b981;
            --accent-green-hover: #059669;
            --accent-blue: #3b82f6;
            --border-color: #374151;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            background-color: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 80px;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-green);
        }

        .lang-switch {
            display: inline-flex;
            gap: 8px;
            margin-left: 24px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 4px 8px;
            font-size: 0.75rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            border-color: var(--accent-green);
            color: var(--text-main);
            background-color: rgba(16, 185, 129, 0.1);
        }

        nav {
            display: flex;
            align-items: center;
        }

        nav a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            margin-left: 24px;
            transition: color 0.3s ease;
        }

        nav a:hover, nav a.active {
            color: var(--text-main);
        }

        section {
            padding: 100px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--accent-green);
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            max-width: 800px;
            margin-bottom: 56px;
        }

        /* 1. Hero Section */
        #hero {
            padding-top: 180px;
            padding-bottom: 120px;
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.08), transparent 45%);
        }

        .hero-tag {
            display: inline-block;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .hero-title {
            font-size: 3.5rem;
            font-weight: 700;
            line-height: 1.15;
            letter-spacing: -1.5px;
            margin-bottom: 24px;
            max-width: 900px;
        }

        .hero-hook {
            font-size: 1.25rem;
            color: var(--text-main);
            border-left: 4px solid var(--accent-green);
            padding-left: 24px;
            margin: 32px 0;
            max-width: 800px;
            font-style: italic;
        }

        .hero-subtitle-text {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 750px;
            margin-bottom: 40px;
        }

        .btn-group {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 28px;
            border-radius: 6px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--accent-green);
            color: #000;
        }

        .btn-primary:hover {
            background-color: var(--accent-green-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: var(--bg-tertiary);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        /* 2. Executive Overview (BM_1.jpg) */
        #executive-overview {
            background-color: var(--bg-secondary);
            padding: 80px 0;
        }

        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 24px;
        }

        .overview-box {
            background-color: var(--bg-primary);
            border: 1px solid var(--border-color);
            padding: 32px;
            border-radius: 8px;
            transition: border-color 0.3s ease;
        }

        .overview-box:hover {
            border-color: var(--accent-blue);
        }

        .overview-box-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-main);
        }

        .overview-box-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* 3. Transformation Journey */
        #transformation-journey {
            background-color: var(--bg-primary);
        }

        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 32px;
        }

        .card {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            padding: 40px;
            border-radius: 8px;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(16, 185, 129, 0.4);
        }

        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .card-text {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        /* 4. Use Cases & Architecture Section (BM_2, BM_3, BM_4) */
        #architecture-cases {
            background-color: var(--bg-secondary);
        }

        .architecture-layout {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        @media (max-width: 900px) {
            .architecture-layout {
                grid-template-columns: 1fr;
            }
        }

        .arch-tabs {
            display: flex;
